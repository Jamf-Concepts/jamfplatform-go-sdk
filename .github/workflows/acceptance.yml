name: Acceptance Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1-5" # Weekdays at 06:00 UTC

permissions:
  contents: read

jobs:
  acceptance:
    name: Acceptance Tests
    runs-on: ubuntu-latest
    environment: acceptance
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: JAMFPLATFORM_ACC=1 go test -v -cover -count=1 -tags acceptance -timeout 120m -p=1 ./...
        env:
          # Required credentials — all suites fail/skip without these.
          JAMFPLATFORM_BASE_URL: ${{ secrets.JAMFPLATFORM_BASE_URL }}
          JAMFPLATFORM_CLIENT_ID: ${{ secrets.JAMFPLATFORM_CLIENT_ID }}
          JAMFPLATFORM_CLIENT_SECRET: ${{ secrets.JAMFPLATFORM_CLIENT_SECRET }}
          JAMFPLATFORM_TENANT_ID: ${{ secrets.JAMFPLATFORM_TENANT_ID }}
          # Optional tokens — when present, the suite exercises real
          # register/lifecycle flows instead of probe-only paths.
          JAMFPLATFORM_DEP_TOKEN: ${{ secrets.JAMFPLATFORM_DEP_TOKEN }}
          JAMFPLATFORM_VPP_TOKEN: ${{ secrets.JAMFPLATFORM_VPP_TOKEN }}
          JAMFPLATFORM_PROTECT_URL: ${{ secrets.JAMFPLATFORM_PROTECT_URL }}
          JAMFPLATFORM_PROTECT_CLIENT_ID: ${{ secrets.JAMFPLATFORM_PROTECT_CLIENT_ID }}
          JAMFPLATFORM_PROTECT_PASSWORD: ${{ secrets.JAMFPLATFORM_PROTECT_PASSWORD }}
          # Fixture-ID env vars (JAMFPLATFORM_CLASSIC_COMPUTER_ID,
          # JAMFPLATFORM_CLASSIC_MOBILE_DEVICE_ID,
          # JAMFPLATFORM_DEVICE_GROUP_ID, JAMFPLATFORM_WIFI_PROFILE_ID,
          # JAMFPLATFORM_VPP_TEST_LOCATION_ID) are intentionally NOT
          # wired — tests auto-discover or self-create those fixtures
          # when the vars are unset. The vars exist as local-run
          # overrides only.
          #
          # Destructive opt-in gates (JAMFPLATFORM_PRELOAD_WIPE_OK,
          # JAMFPLATFORM_USER_WRITE_OK) are also NOT wired — they
          # would wipe inventory-preload records / leak orphan users
          # on every run. Enable locally only when intended.
