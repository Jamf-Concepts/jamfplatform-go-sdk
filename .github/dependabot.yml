version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "gomod"
    directory: "/tools"
    schedule:
      interval: "weekly"

  - package-ecosystem: "gomod"
    directory: "/tools/generate"
    schedule:
      interval: "weekly"
